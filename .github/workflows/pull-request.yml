name: PR (web-meeting)
run-name: "web-meeting@pr${{ github.event.pull_request.number }}#${{ github.run_number }} - ${{ github.event.pull_request.title }}"

on:
  pull_request:

permissions: { contents: read }
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare
    uses: webitel/reusable-workflows/.github/workflows/node-prepare.yml@v2
    permissions:
      contents: read
      pull-requests: read

    with:
      development-branch: ${{ github.event.repository.default_branch }}
      triggered-branch: ${{ github.event.pull_request.base.ref }}

  checks:
    name: Checks
    needs: [ prepare ]
    uses: webitel/reusable-workflows/.github/workflows/node-checks.yml@v2
    permissions:
      contents: read
      actions: read
      checks: write
      pull-requests: write
      security-events: write

    with:
      changes: ${{ needs.prepare.outputs.changes }}

  compile:
    name: Build
    needs: [ prepare ]
    uses: webitel/reusable-workflows/.github/workflows/node-build.yml@v2
    with:
      arch: all
      version: ${{ needs.prepare.outputs.version }}
      version-build: ${{ github.run_number }}
      prerelease: dev~pr${{ github.event.pull_request.number }}
      package-name: web-meeting
      package-description: ${{ github.event.repository.description }}
      app-root: /opt/www/meetings
      package-contents: |
        src=public/config.example.jsonc dst=/opt/www/meetings/config.example.jsonc type=config
        

      package-depends: 
      scripts: |
        
